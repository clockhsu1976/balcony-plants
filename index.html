function MapCanvas({ plants, zones, height, editable, hovered, setHovered, canvasRef, onPointerDown }) {
  return (
    <div ref={canvasRef} className="relative w-full rounded-3xl border-2 border-stone-300 bg-[#fbfdf7] shadow-md" style={{ height, touchAction: "none" }}>
      {Object.entries(zones).map(([zid, z]) => (
        <div key={zid}
          onPointerDown={editable ? (e) => onPointerDown(e, "zone-move", zid) : undefined}
          className={`absolute rounded-2xl border-2 ${z.ring} ${z.bg} ${editable ? "cursor-move" : ""}`}
          style={{ left: `${z.x}%`, top: `${z.y}%`, width: `${z.w}%`, height: `${z.h}%` }}>
          <div className={`absolute left-2 top-2 z-10 flex items-center gap-1 rounded-full border px-2 py-0.5 text-[11px] font-bold ${z.tag} pointer-events-none`}>
            {editable && <span className="opacity-50">⠿</span>}
            {z.label}<span className="font-normal opacity-60">{z.range}</span>
          </div>
          {zid === "main" && (
            <div className="pointer-events-none absolute inset-0 z-0 overflow-hidden rounded-2xl">
              <div className="absolute inset-0"
                style={{ background: "linear-gradient(255deg, rgba(251,191,36,0.5) 0%, rgba(251,191,36,0.34) 22%, rgba(251,191,36,0.16) 45%, transparent 68%)" }} />
              <span className="absolute right-2 top-2 whitespace-nowrap text-[10px] font-bold tracking-wide text-amber-600/90">☀ 午後強光帶</span>
              <span className="absolute bottom-2 left-3 whitespace-nowrap text-[9px] font-semibold text-amber-700/70">← 午後沿此方向往內側掃（右下→左上）</span>
            </div>
          )}
          {Object.entries(plants).filter(([, p]) => p.zone === zid).map(([id, p]) => {
            const active = hovered === id;
            return (
              <div key={id}
                onPointerDown={editable ? (e) => onPointerDown(e, "plant", id) : undefined}
                onMouseEnter={() => setHovered(id)} onMouseLeave={() => setHovered(null)}
                className={`absolute flex -translate-x-1/2 -translate-y-1/2 flex-col items-center ${editable ? "cursor-grab active:cursor-grabbing" : ""}`}
                style={{ left: `${p.x}%`, top: `${p.y}%` }}>
                <div className={`relative rounded-full transition ${active ? "bg-white shadow-md ring-2 ring-emerald-300" : p.moved ? "border-2 border-dashed border-rose-400" : ""}`}>
                  <PlantIcon icon={p.icon} water={p.water} size={46} />
                  <span className="absolute -right-1 -top-1 flex h-4 w-4 items-center justify-center rounded-full bg-white text-[9px] shadow ring-1 ring-stone-200" title={`耐曬：${SUN[p.sun].label}`}>{SUN[p.sun].icon}</span>
                  {p.moved && <span className="absolute -left-1 -top-1 flex h-4 w-4 items-center justify-center rounded-full bg-rose-500 text-[9px] text-white shadow" title={`由 ${p.moved} 搬入`}>↪</span>}
                </div>
                <span className={`-mt-1 flex h-5 min-w-5 items-center justify-center rounded-full px-1 text-[11px] font-bold text-white ${HYDRO[p.hydro].badge}`}>{id}</span>
                {active && <span className="absolute top-full z-20 mt-0.5 whitespace-nowrap rounded bg-stone-800 px-2 py-0.5 text-[11px] text-white">{p.name}</span>}
              </div>
            );
          })}
          {editable && (
            <div onPointerDown={(e) => { e.stopPropagation(); onPointerDown(e, "zone-resize", zid); }}
              className="absolute bottom-0 right-0 z-10 h-5 w-5 cursor-nwse-resize rounded-tl-lg bg-stone-300/70"
              style={{ clipPath: "polygon(100% 0,100% 100%,0 100%)" }} title="拖曳調整大小" />
          )}
        </div>
      ))}
    </div>
  );
}

function App() {
  const [plants, setPlants] = useState(INIT_PLANTS);
  const [zones, setZones] = useState(INIT_ZONES);
  const [editMode, setEditMode] = useState(true);
  const [hovered, setHovered] = useState(null);
  const [view, setView] = useState("map");
  const [saveState, setSaveState] = useState("idle");
  const [canvasH, setCanvasH] = useState(480);
  const canvasRef = useRef(null);
  const drag = useRef(null);
  const zonesRef = useRef(zones);
  zonesRef.current = zones;

  useEffect(() => {
    try {
      const res = store.get("balcony-layout");
      if (res && res.value) {
        const data = JSON.parse(res.value);
        if (data.plants) setPlants((prev) => { const n = { ...prev }; for (const id in data.plants) if (n[id]) n[id] = { ...n[id], x: data.plants[id].x, y: data.plants[id].y, zone: data.plants[id].zone ?? n[id].zone }; return n; });
        if (data.zones) setZones((prev) => { const n = { ...prev }; for (const z in data.zones) if (n[z]) n[z] = { ...n[z], ...data.zones[z] }; return n; });
        if (typeof data.canvasH === "number") setCanvasH(data.canvasH);
      }
    } catch {}
  }, []);

  const save = () => {
    setSaveState("saving");
    const sp = {}; for (const id in plants) sp[id] = { x: plants[id].x, y: plants[id].y, zone: plants[id].zone };
    const sz = {}; for (const z in zones) { const { x, y, w, h } = zones[z]; sz[z] = { x, y, w, h }; }
    const ok = store.set("balcony-layout", JSON.stringify({ plants: sp, zones: sz, canvasH }));
    if (ok) { setSaveState("saved"); setTimeout(() => setSaveState("idle"), 1800); } else { setSaveState("idle"); alert("儲存失敗"); }
  };

  const onPointerDown = (e, kind, id) => {
    if (!editMode) return;
    e.preventDefault(); e.stopPropagation();
    const rect = canvasRef.current.getBoundingClientRect();
    drag.current = { kind, id, rect, startX: e.clientX, startY: e.clientY,
      orig: kind === "plant" ? { ...plants[id] } : kind === "canvas-resize" ? { h: canvasH } : { ...zones[id] } };
    window.addEventListener("pointermove", onPointerMove);
    window.addEventListener("pointerup", onPointerUp);
  };
  const onPointerMove = useCallback((e) => {
    const d = drag.current; if (!d) return;
    if (d.kind === "canvas-resize") { setCanvasH(clamp(d.orig.h + (e.clientY - d.startY), 280, 1000)); return; }
    const dxPct = ((e.clientX - d.startX) / d.rect.width) * 100;
    const dyPct = ((e.clientY - d.startY) / d.rect.height) * 100;
    if (d.kind === "plant") setPlants((prev) => { const p = prev[d.id]; const zb = zonesRef.current[p.zone]; return { ...prev, [d.id]: { ...p, x: clamp(d.orig.x + (dxPct / zb.w) * 100, 3, 97), y: clamp(d.orig.y + (dyPct / zb.h) * 100, 3, 97) } }; });
    else if (d.kind === "zone-move") setZones((prev) => { const z = prev[d.id]; return { ...prev, [d.id]: { ...z, x: clamp(d.orig.x + dxPct, 0, 100 - z.w), y: clamp(d.orig.y + dyPct, 0, 100 - z.h) } }; });
    else if (d.kind === "zone-resize") setZones((prev) => { const z = prev[d.id]; return { ...prev, [d.id]: { ...z, w: clamp(d.orig.w + dxPct, 15, 100 - z.x), h: clamp(d.orig.h + dyPct, 15, 100 - z.y) } }; });
  }, []);
  const onPointerUp = useCallback(() => { drag.current = null; window.removeEventListener("pointermove", onPointerMove); window.removeEventListener("pointerup", onPointerUp); }, [onPointerMove]);

  const reset = () => { setPlants(INIT_PLANTS); setZones(INIT_ZONES); setCanvasH(480); };

  const suggestedPlants = {}; for (const id in plants) suggestedPlants[id] = { ...plants[id], ...(SUGGESTED[id] || {}) };
  const suggestedPlants2 = {}; for (const id in plants) suggestedPlants2[id] = { ...plants[id], ...(SUGGESTED2[id] || {}) };

  return (
    <div className="min-h-screen bg-gradient-to-b from-[#f4f6ef] to-[#eef2e6] p-4 font-sans">
      <div className="mx-auto max-w-4xl">
        <header className="mb-3 flex flex-wrap items-center justify-between gap-2">
          <div>
            <h1 className="text-2xl font-bold text-stone-700">陽台植物分布圖</h1>
            <p className="text-xs text-stone-400">共 23 株 · 編號顏色 = 喜水性</p>
          </div>
          <div className="flex gap-2">
            <button onClick={save} disabled={saveState === "saving"} className={`rounded-full px-4 py-1.5 text-sm font-semibold shadow-sm transition ${saveState === "saved" ? "bg-sky-600 text-white" : "bg-stone-700 text-white"}`}>{saveState === "saving" ? "儲存中…" : saveState === "saved" ? "✓ 已儲存" : "💾 儲存版面"}</button>
            <button onClick={() => setEditMode((v) => !v)} className={`rounded-full px-4 py-1.5 text-sm font-semibold shadow-sm transition ${editMode ? "bg-emerald-600 text-white" : "bg-white text-stone-600 border border-stone-300"}`}>{editMode ? "✏️ 編輯中" : "🔒 檢視模式"}</button>
            <button onClick={reset} className="rounded-full border border-stone-300 bg-white px-4 py-1.5 text-sm font-semibold text-stone-600 shadow-sm">重設</button>
          </div>
        </header>

        <div className="mb-3 flex gap-2">
          <button onClick={() => setView("map")} className={`rounded-full px-4 py-1.5 text-sm font-semibold transition ${view === "map" ? "bg-emerald-600 text-white shadow-sm" : "bg-white text-stone-500 border border-stone-300"}`}>🗺️ 分布圖</button>
          <button onClick={() => setView("care")} className={`rounded-full px-4 py-1.5 text-sm font-semibold transition ${view === "care" ? "bg-emerald-600 text-white shadow-sm" : "bg-white text-stone-500 border border-stone-300"}`}>🪴 介質＋肥料</button>
        </div>

        {view === "care" && (
          <div>
            <p className="mb-3 text-center text-xs tracking-widest text-stone-400">── 介質分群速查 ──</p>
            <div className="grid gap-3 sm:grid-cols-2">
              {CARE_GROUPS.map((g) => (
                <div key={g.key} className={`rounded-2xl border-2 ${g.color} p-4 shadow-sm`}>
                  <div className="mb-1 flex items-baseline justify-between gap-2">
                    <h3 className="text-sm font-bold text-stone-700">{g.title}</h3>
                    <span className="text-[11px] text-stone-400">編號 {g.ids}</span>
                  </div>
                  <p className="text-xs text-stone-600"><b className="text-stone-500">介質：</b>{g.soil}</p>
                  <p className="mt-0.5 text-xs text-stone-600"><b className="text-stone-500">肥料：</b>{g.fert}</p>
                </div>
              ))}
            </div>
            <p className="mb-3 mt-6 text-center text-xs tracking-widest text-stone-400">── 各株介質＋肥料附表 ──</p>
            <div className="overflow-x-auto rounded-2xl border border-stone-200 bg-white/80 shadow-sm">
              <table className="w-full border-collapse text-left text-sm">
                <thead><tr className="border-b-2 border-stone-200 bg-stone-50 text-xs text-stone-500">
                  <th className="px-3 py-2.5 font-semibold">編號</th><th className="px-3 py-2.5 font-semibold">名稱</th><th className="px-3 py-2.5 font-semibold">介質配方</th><th className="px-3 py-2.5 font-semibold">肥料</th><th className="px-3 py-2.5 font-semibold whitespace-nowrap">施肥頻率</th>
                </tr></thead>
                <tbody>
                  {Object.keys(CARE).sort((a, b) => Number(a) - Number(b)).map((id) => {
                    const p = plants[id]; const c = CARE[id]; const active = hovered === id;
                    return (
                      <tr key={id} onMouseEnter={() => setHovered(id)} onMouseLeave={() => setHovered(null)} className={`border-b border-stone-100 align-top transition ${active ? "bg-emerald-50" : ""}`}>
                        <td className="px-3 py-2.5"><span className={`flex h-6 w-6 items-center justify-center rounded-full text-xs font-bold text-white ${HYDRO[p.hydro].badge}`}>{id}</span></td>
                        <td className="px-3 py-2.5 whitespace-nowrap font-medium text-stone-700">{p.name}<span className="ml-1 text-xs" title={`耐曬：${SUN[p.sun].label}`}>{SUN[p.sun].icon}</span></td>
                        <td className="px-3 py-2.5 text-stone-600">{c.soil}</td>
                        <td className="px-3 py-2.5 text-stone-600">{c.fert}</td>
                        <td className="px-3 py-2.5 text-stone-500">{c.freq}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <p className="mt-3 rounded-lg bg-emerald-50 px-3 py-2 text-xs text-emerald-700">通則：施肥集中春夏生長期，秋冬減量或停肥；液肥寧稀勿濃，蕨類與多肉尤其要淡。耐旱／多肉類介質重排水、忌積水；蕨類與喜水類介質保濕但仍需透氣。食用香草建議用有機肥較安心。</p>
          </div>
        )}

        {view === "map" && (<React.Fragment>
          {editMode && <p className="mb-2 rounded-lg bg-emerald-50 px-3 py-2 text-xs text-emerald-700">拖曳<b>大框框底部中央</b>的把手可調整整體高度；拖曳<b>區塊空白處</b>整塊移動、<b>植物</b>在區塊內移動、區塊<b>右下角</b>把手調整區塊大小。調整好後按「💾 儲存版面」，下次打開會自動還原。</p>}

          <div className="relative">
            <MapCanvas plants={plants} zones={zones} height={canvasH} editable={editMode} hovered={hovered} setHovered={setHovered} canvasRef={canvasRef} onPointerDown={onPointerDown} />
            {editMode && <div onPointerDown={(e) => { e.stopPropagation(); onPointerDown(e, "canvas-resize"); }} className="absolute -bottom-2 left-1/2 z-20 flex h-4 w-16 -translate-x-1/2 cursor-ns-resize items-center justify-center rounded-full border border-stone-300 bg-white shadow-sm" title="拖曳調整整體高度"><div className="h-0.5 w-8 rounded-full bg-stone-400" /></div>}
          </div>

          <div className="mt-7">
            <div className="mb-2 flex items-center justify-center gap-2"><span className="rounded-full bg-emerald-600 px-3 py-1 text-sm font-bold text-white">🌱 建議擺放區</span><span className="text-xs text-stone-400">依耐曬程度 + 喜水性重新排列</span></div>
            <MapCanvas plants={suggestedPlants} zones={zones} height={canvasH} editable={false} hovered={hovered} setHovered={setHovered} canvasRef={null} onPointerDown={() => {}} />
            <p className="mt-2 rounded-lg bg-amber-50 px-3 py-2 text-xs text-amber-700">排列原則（依 2:30 實景修正）：午後強光帶從<b>右側欄杆往主區內側（左）掃</b>，整個下午<b>右側／右下最曬</b>。所以右側放最耐曬 ☀️（虎尾蘭、迷迭香、千年木）；喜陰 🌿（山蘇、袋鼠蕨）退到<b>左側／內側</b>陰涼處；喜水 🔵 集中左側方便澆水。此區為固定建議，不可拖曳。</p>
          </div>

          <div className="mt-7">
            <div className="mb-2 flex items-center justify-center gap-2"><span className="rounded-full bg-rose-500 px-3 py-1 text-sm font-bold text-white">🔀 建議擺放區 2（跨區）</span><span className="text-xs text-stone-400">含跨區搬移 · ↪ 標記為換區植物</span></div>
            <MapCanvas plants={suggestedPlants2} zones={zones} height={canvasH} editable={false} hovered={hovered} setHovered={setHovered} canvasRef={null} onPointerDown={() => {}} />
            <div className="mt-2 rounded-lg bg-rose-50 px-3 py-2 text-xs text-rose-700">
              <p className="mb-1 font-semibold">跨區搬移建議（↪ 紅色虛線框）：</p>
              <ul className="space-y-0.5">
                <li>• <b>22 九層塔</b>：洗手台區 → 主區強光帶（☀️ 喜曬、能吃水，越曬長越好，採收也方便）</li>
                <li>• <b>23 球根蘭花</b>：洗手台區 → 主區左內側陰涼處（🌿 喜陰，避開洗手台較強的光）</li>
                <li>• <b>16、17 水培枝條</b>：冷氣外機區 → 洗手台區（換水取水方便，避免外機熱風使水變質長藻）</li>
              </ul>
              <p className="mt-1.5 text-[11px] text-rose-500">※ 搬移後冷氣外機區只留耐曬的短葉虎尾蘭與酪梨；洗手台區改放水培＋金錢樹。實際可行性請依各區空間與冷氣使用情況再評估。</p>
            </div>
          </div>

          <div className="mt-4 grid gap-3 sm:grid-cols-2">
            <div className="rounded-2xl border border-stone-200 bg-white/70 p-3 shadow-sm">
              <p className="mb-2 text-center text-xs tracking-widest text-stone-400">── 編號顏色 = 喜水性 ──</p>
              <div className="flex flex-col gap-1.5">
                {Object.values(HYDRO).map((h) => (<div key={h.label} className="flex items-center gap-2"><span className={`flex h-6 w-6 shrink-0 items-center justify-center rounded-full text-[11px] font-bold text-white ${h.badge}`}>#</span><span className="text-sm font-semibold text-stone-700">{h.label}</span><span className="text-xs text-stone-400">{h.desc}</span></div>))}
              </div>
            </div>
            <div className="rounded-2xl border border-stone-200 bg-white/70 p-3 shadow-sm">
              <p className="mb-2 text-center text-xs tracking-widest text-stone-400">── 角落圖示 = 耐曬程度 ──</p>
              <div className="flex flex-col gap-1.5">
                {Object.values(SUN).map((s) => (<div key={s.label} className="flex items-center gap-2"><span className="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-white text-sm shadow ring-1 ring-stone-200">{s.icon}</span><span className="text-sm font-semibold text-stone-700">{s.label}</span><span className="text-xs text-stone-400">{s.desc}</span></div>))}
              </div>
              <p className="mt-2 text-[10px] text-amber-600/80">※ 主區午後強光帶從右側欄杆往內側掃（右下最曬），喜陰 🌿 植物建議移到左側／內側。</p>
            </div>
          </div>

          <div className="mt-4 flex flex-col gap-4">
            {["main", "ac", "sink"].map((zid) => {
              const z = zones[zid];
              const ids = Object.keys(plants).filter((id) => plants[id].zone === zid).sort((a, b) => Number(a) - Number(b));
              return (
                <div key={zid} className="rounded-2xl border border-stone-200 bg-white/70 p-5 shadow-sm">
                  <div className="mb-4 flex items-center gap-2"><span className={`rounded-full border px-3 py-1 text-sm font-bold ${z.tag}`}>{z.label}</span><span className="text-xs text-stone-400">編號 {z.range}</span></div>
                  <ul className="grid grid-cols-1 gap-x-6 gap-y-2.5 sm:grid-cols-2 lg:grid-cols-3">
                    {ids.map((id) => {
                      const p = plants[id]; const active = hovered === id;
                      return (
                        <li key={id} onMouseEnter={() => setHovered(id)} onMouseLeave={() => setHovered(null)} className={`flex items-center gap-2.5 rounded-lg px-2 py-1.5 transition ${active ? "bg-emerald-50" : "hover:bg-stone-50"}`}>
                          <PlantIcon icon={p.icon} water={p.water} size={34} />
                          <span className={`flex h-6 w-6 shrink-0 items-center justify-center rounded-full text-xs font-bold text-white ${HYDRO[p.hydro].badge}`}>{id}</span>
                          <span className="text-sm text-stone-700">{p.name}</span>
                          <span className="ml-auto flex shrink-0 items-center gap-1.5 text-[10px] text-stone-400"><span title={`耐曬：${SUN[p.sun].label}`}>{SUN[p.sun].icon}</span>{HYDRO[p.hydro].label}</span>
                        </li>
                      );
                    })}
                  </ul>
                </div>
              );
            })}
          </div>
        </React.Fragment>)}

        <footer className="mt-5 text-center text-xs text-stone-300">清新植物圖鑑紀錄 · 現況（可編輯）· 建議 1（區內微調）· 建議 2（跨區搬移）</footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
